    "hook": {
      "on-activate": "echo \"=========================================\"\necho \"PyTorch 2.9.1 Build Environment (CUDA 13.0)\"\necho \"=========================================\"\necho \"\"\necho \"Available build commands:\"\necho \"  flox build --stability=unstable <variant>  # Build a specific variant\"\necho \"\"\necho \"GPU variants (CUDA 13.0):\"\necho \"  pytorch-python313-cuda13_0-sm120-avx512   # RTX 5090\"\necho \"  pytorch-python313-cuda13_0-sm90-avx512    # H100/L40S\"\necho \"  pytorch-python313-cuda13_0-sm86-avx2      # RTX 3090/A40\"\necho \"  pytorch-python313-cuda13_0-sm80-avx2      # A100/A30\"\necho \"\"\necho \"CPU-only variants:\"\necho \"  pytorch-python313-cpu-avx2                # Broad compatibility\"\necho \"  pytorch-python313-cpu-avx512              # Modern CPUs\"\necho \"\"\necho \"Note: CUDA 13.0 requires --stability=unstable flag\"\necho \"=========================================\"\n"
    },
    "profile": {
      "common": "# Helper functions for building and testing\nbuild_variant() {\n    local variant=\"$1\"\n    echo \"Building PyTorch 2.9.1 variant: $variant\"\n\n    if [[ \"$variant\" == *\"cuda13\"* ]]; then\n        echo \"Note: Using --stability=unstable for CUDA 13.0 support\"\n        flox build --stability=unstable \"$variant\"\n    else\n        flox build \"$variant\"\n    fi\n}\n\ntest_variant() {\n    local variant=\"$1\"\n    if [ -f \"./test-build.sh\" ]; then\n        ./test-build.sh \"$variant\"\n    else\n        echo \"Test script not found. Run: ./create-test-scripts.sh\"\n    fi\n}\n\nlist_variants() {\n    echo \"Available PyTorch 2.9.1 variants:\"\n    ls -1 .flox/pkgs/*.nix 2>/dev/null | xargs -n1 basename | sed 's/.nix$//' | sort\n}\n\n# Export helper functions\nexport -f build_variant\nexport -f test_variant\nexport -f list_variants\n"
    },
    "options": {
      "systems": [
        "x86_64-linux",
        "aarch64-linux"
      ]
    }
  },
